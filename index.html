<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آواپلیر | TahaGhasemi 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;200;300;400;500;600;700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #ffffff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* هدر */
        header {
            text-align: center;
            padding: 40px 0;
            position: relative;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .logo-icon {
            font-size: 3.5em;
            animation: float 3s ease-in-out infinite;
        }

        .logo-text {
            font-size: 3em;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,255,255,0.3);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .creator-badge {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 8px 25px;
            font-size: 0.95em;
        }

        .creator-badge span {
            color: #ffd700;
            font-weight: 700;
        }

        .year {
            background: rgba(255,215,0,0.3);
            border-radius: 5px;
            padding: 2px 8px;
            margin-left: 5px;
        }

        /* بخش آپلود */
        .upload-section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .upload-area {
            border: 3px dashed rgba(255,255,255,0.3);
            border-radius: 30px;
            padding: 50px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.05);
        }

        .upload-area:hover {
            border-color: #ffd700;
            background: rgba(255,255,255,0.1);
            transform: scale(1.02);
        }

        .upload-area.dragover {
            border-color: #4CAF50;
            background: rgba(76,175,80,0.1);
        }

        .upload-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.5em;
            margin-bottom: 15px;
        }

        .upload-hint {
            opacity: 0.7;
            font-size: 0.9em;
        }

        .file-input {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            font-family: 'Vazirmatn', sans-serif;
            font-weight: 600;
            margin: 10px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }

        /* ساختار اصلی */
        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        /* کارت آهنگ */
        .song-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .cover-art {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 20px;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .cover-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cover-art.default {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
        }

        .now-playing {
            text-align: center;
        }

        .song-title {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .song-artist {
            color: #ffd700;
            font-size: 1em;
            margin-bottom: 15px;
        }

        /* کنترل‌ها */
        .player-controls {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .progress-area {
            margin-bottom: 20px;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffa500);
            border-radius: 10px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.8);
            font-size: 0.9em;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
        }

        .control-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        .control-btn.active {
            background: linear-gradient(135deg, #ffd700, #ffa500);
        }

        .control-btn.play-btn {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            font-size: 30px;
        }

        .mode-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            flex-wrap: wrap;
        }

        .mode-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #ffd700, #ffa500);
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .volume-slider {
            flex: 1;
            height: 5px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            background: #ffd700;
            border-radius: 50%;
            cursor: pointer;
        }

        /* بخش فایل‌ها */
        .files-section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-header h2 {
            font-size: 1.5em;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .song-count {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9em;
        }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px 5px;
        }

        .files-grid::-webkit-scrollbar {
            width: 8px;
        }

        .files-grid::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .files-grid::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            border-radius: 10px;
        }

        .music-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .music-item:hover {
            transform: translateX(-5px);
            background: rgba(255,255,255,0.1);
        }

        .music-item.active {
            border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }

        .item-cover {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            flex-shrink: 0;
        }

        .item-info {
            flex: 1;
            min-width: 0;
        }

        .item-name {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.95em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-meta {
            display: flex;
            gap: 10px;
            font-size: 0.75em;
            color: rgba(255,255,255,0.7);
        }

        .playing-indicator {
            width: 8px;
            height: 8px;
            background: #ffd700;
            border-radius: 50%;
            position: absolute;
            top: 10px;
            right: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.5); }
        }

        /* نوتیفیکیشن */
        .notification {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 40px;
            color: white;
            z-index: 2000;
            transition: transform 0.5s;
            border-right: 4px solid #ffd700;
        }

        .notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .notification.error {
            border-right-color: #ff4444;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .upload-area {
                padding: 30px;
            }
            
            .upload-icon {
                font-size: 3em;
            }
            
            .upload-text {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-icon">🎵</span>
                <span class="logo-text">آواپلیر</span>
            </div>
            <div class="creator-badge">
                ساخته شده با <span>❤️</span> توسط <span>TahaGhasemi</span> 
                <span class="year">2026</span>
            </div>
        </header>

        <!-- بخش آپلود فایل -->
        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">🎵</div>
                <div class="upload-text">فایل‌های موسیقی خود را بکشید و رها کنید</div>
                <div class="upload-hint">یا برای انتخاب فایل کلیک کنید</div>
                <input type="file" id="fileInput" class="file-input" multiple accept=".mp3,.wav,.ogg,.m4a,.flac,.aac">
            </div>
            <button class="btn" id="selectFilesBtn">📁 انتخاب فایل‌ها</button>
            <button class="btn btn-secondary" id="clearFilesBtn">🗑️ پاک کردن لیست</button>
        </div>

        <!-- پلیر مخفی در ابتدا -->
        <div class="main-content" id="playerSection" style="display: none;">
            <!-- کارت آهنگ -->
            <div class="song-card">
                <div class="cover-art default" id="coverArt">
                    <span>🎵</span>
                </div>
                <div class="now-playing">
                    <div class="song-title" id="currentSongTitle">آهنگی انتخاب نشده</div>
                    <div class="song-artist" id="currentSongArtist">TahaGhasemi</div>
                </div>
            </div>

            <!-- کنترل‌ها -->
            <div class="player-controls">
                <audio id="audioPlayer" preload="metadata"></audio>

                <div class="progress-area">
                    <div class="progress-bar-container" id="progressContainer">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div class="time-info">
                        <span id="currentTime">00:00</span>
                        <span id="duration">00:00</span>
                    </div>
                </div>

                <div class="control-buttons">
                    <button class="control-btn" id="shuffleBtn" title="تصادفی">🔀</button>
                    <button class="control-btn" id="prevBtn" title="قبلی">⏮</button>
                    <button class="control-btn play-btn" id="playPauseBtn" title="پخش/توقف">▶</button>
                    <button class="control-btn" id="nextBtn" title="بعدی">⏭</button>
                    <button class="control-btn" id="repeatBtn" title="تکرار">🔁</button>
                </div>

                <div class="mode-buttons">
                    <button class="mode-btn" id="playlistBtn">📋 پلی‌لیست فعلی</button>
                    <button class="mode-btn" id="savePlaylistBtn">💾 ذخیره پلی‌لیست</button>
                    <button class="mode-btn" id="loadPlaylistBtn">📂 بارگذاری پلی‌لیست</button>
                </div>

                <div class="volume-control">
                    <span>🔊</span>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
                </div>
            </div>
        </div>

        <!-- لیست فایل‌ها -->
        <div class="files-section">
            <div class="section-header">
                <h2>📂 لیست پخش</h2>
                <span class="song-count" id="songCount">۰ آهنگ</span>
            </div>
            <div class="files-grid" id="fileList">
                <div class="empty-state" style="text-align: center; padding: 60px; color: rgba(255,255,255,0.7);">
                    <p style="font-size: 4em; margin-bottom: 20px;">🎵</p>
                    <p>فایل‌های موسیقی خود را آپلود کنید</p>
                </div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        class UniversalMusicPlayer {
            constructor() {
                this.audio = document.getElementById('audioPlayer');
                this.fileList = document.getElementById('fileList');
                this.playerSection = document.getElementById('playerSection');
                this.currentSongTitle = document.getElementById('currentSongTitle');
                this.currentSongArtist = document.getElementById('currentSongArtist');
                this.progressBar = document.getElementById('progressBar');
                this.currentTime = document.getElementById('currentTime');
                this.duration = document.getElementById('duration');
                this.playPauseBtn = document.getElementById('playPauseBtn');
                this.coverArt = document.getElementById('coverArt');
                this.songCount = document.getElementById('songCount');
                
                // Properties
                this.songs = [];
                this.currentSongIndex = -1;
                this.repeatMode = 'none';
                this.shuffleMode = false;
                
                // Load from localStorage
                this.loadFromStorage();
                
                // Initialize
                this.setupEventListeners();
                this.setupDragAndDrop();
            }

            setupEventListeners() {
                // Upload buttons
                document.getElementById('selectFilesBtn').addEventListener('click', () => {
                    document.getElementById('fileInput').click();
                });
                
                document.getElementById('fileInput').addEventListener('change', (e) => {
                    this.handleFiles(e.target.files);
                });
                
                document.getElementById('clearFilesBtn').addEventListener('click', () => {
                    this.clearAllFiles();
                });

                // Player controls
                document.getElementById('playPauseBtn').addEventListener('click', () => this.togglePlay());
                document.getElementById('prevBtn').addEventListener('click', () => this.playPrevious());
                document.getElementById('nextBtn').addEventListener('click', () => this.playNext());
                document.getElementById('shuffleBtn').addEventListener('click', () => this.toggleShuffle());
                document.getElementById('repeatBtn').addEventListener('click', () => this.toggleRepeat());
                
                // Playlist buttons
                document.getElementById('savePlaylistBtn').addEventListener('click', () => this.savePlaylist());
                document.getElementById('loadPlaylistBtn').addEventListener('click', () => this.loadPlaylist());
                
                // Audio events
                this.audio.addEventListener('timeupdate', () => this.updateProgress());
                this.audio.addEventListener('loadedmetadata', () => this.updateDuration());
                this.audio.addEventListener('ended', () => this.handleSongEnd());
                this.audio.addEventListener('play', () => this.updatePlayButton());
                this.audio.addEventListener('pause', () => this.updatePlayButton());

                // Progress bar click
                document.getElementById('progressContainer').addEventListener('click', (e) => {
                    const rect = e.currentTarget.getBoundingClientRect();
                    const percent = (e.clientX - rect.left) / rect.width;
                    this.audio.currentTime = percent * this.audio.duration;
                });

                // Volume control
                document.getElementById('volumeSlider').addEventListener('input', (e) => {
                    this.audio.volume = e.target.value;
                    localStorage.setItem('playerVolume', e.target.value);
                });

                // Load saved volume
                const savedVolume = localStorage.getItem('playerVolume');
                if (savedVolume) {
                    this.audio.volume = parseFloat(savedVolume);
                    document.getElementById('volumeSlider').value = savedVolume;
                }
            }

            setupDragAndDrop() {
                const uploadArea = document.getElementById('uploadArea');
                
                uploadArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadArea.classList.add('dragover');
                });

                uploadArea.addEventListener('dragleave', () => {
                    uploadArea.classList.remove('dragover');
                });

                uploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadArea.classList.remove('dragover');
                    
                    const files = e.dataTransfer.files;
                    this.handleFiles(files);
                });

                uploadArea.addEventListener('click', () => {
                    document.getElementById('fileInput').click();
                });
            }

            handleFiles(files) {
                const audioFiles = Array.from(files).filter(file => {
                    const type = file.type;
                    return type.startsWith('audio/') || 
                           file.name.endsWith('.mp3') || 
                           file.name.endsWith('.wav') || 
                           file.name.endsWith('.ogg') || 
                           file.name.endsWith('.m4a') || 
                           file.name.endsWith('.flac') ||
                           file.name.endsWith('.aac');
                });

                if (audioFiles.length === 0) {
                    this.showNotification('لطفاً فایل صوتی انتخاب کنید', 'error');
                    return;
                }

                audioFiles.forEach(file => {
                    const url = URL.createObjectURL(file);
                    
                    this.songs.push({
                        file: file,
                        name: file.name,
                        size: file.size,
                        lastModified: file.lastModified,
                        url: url,
                        artist: 'TahaGhasemi',
                        title: file.name.replace(/\.[^/.]+$/, ""),
                        id: Date.now() + Math.random()
                    });
                });

                this.showNotification(`${audioFiles.length} فایل با موفقیت اضافه شد`, 'success');
                this.renderFileList();
                this.updateSongCount();
                
                if (this.songs.length > 0) {
                    this.playerSection.style.display = 'grid';
                }

                // Auto-save to localStorage
                this.saveSongsToStorage();
            }

            renderFileList() {
                if (this.songs.length === 0) {
                    this.fileList.innerHTML = `
                        <div class="empty-state" style="text-align: center; padding: 60px; color: rgba(255,255,255,0.7);">
                            <p style="font-size: 4em; margin-bottom: 20px;">🎵</p>
                            <p>فایل‌های موسیقی خود را آپلود کنید</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                
                this.songs.forEach((song, index) => {
                    const isActive = index === this.currentSongIndex;
                    const size = this.formatSize(song.size);
                    
                    html += `
                        <div class="music-item ${isActive ? 'active' : ''}" data-index="${index}">
                            ${isActive ? '<div class="playing-indicator"></div>' : ''}
                            <div class="item-cover">
                                🎵
                            </div>
                            <div class="item-info">
                                <div class="item-name">${song.title}</div>
                                <div class="item-meta">
                                    <span>${song.artist}</span>
                                    <span>•</span>
                                    <span>${size}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });

                this.fileList.innerHTML = html;

                // Add click events
                document.querySelectorAll('.music-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const index = parseInt(item.dataset.index);
                        this.playSong(index);
                    });
                });
            }

            playSong(index) {
                if (index < 0 || index >= this.songs.length) return;

                if (this.currentSongIndex !== -1) {
                    URL.revokeObjectURL(this.songs[this.currentSongIndex].url);
                }

                this.currentSongIndex = index;
                const song = this.songs[index];

                // Create new URL
                song.url = URL.createObjectURL(song.file);
                this.audio.src = song.url;
                
                this.currentSongTitle.textContent = song.title;
                this.currentSongArtist.textContent = song.artist;
                
                this.coverArt.innerHTML = '<span>🎵</span>';
                this.coverArt.classList.add('default');

                this.renderFileList();

                this.audio.play().catch(e => {
                    this.showNotification('خطا در پخش فایل', 'error');
                });

                // Save to localStorage
                localStorage.setItem('lastPlayed', JSON.stringify({
                    index: index,
                    title: song.title
                }));
            }

            togglePlay() {
                if (this.songs.length === 0) {
                    this.showNotification('لطفاً ابتدا یک آهنگ انتخاب کنید', 'error');
                    return;
                }

                if (this.currentSongIndex === -1 && this.songs.length > 0) {
                    this.playSong(0);
                    return;
                }

                if (this.audio.paused) {
                    this.audio.play();
                } else {
                    this.audio.pause();
                }
            }

            playPrevious() {
                if (this.songs.length === 0) return;
                
                let newIndex;
                if (this.shuffleMode) {
                    newIndex = Math.floor(Math.random() * this.songs.length);
                } else {
                    newIndex = this.currentSongIndex - 1;
                    if (newIndex < 0) newIndex = this.songs.length - 1;
                }
                
                this.playSong(newIndex);
            }

            playNext() {
                if (this.songs.length === 0) return;
                
                let newIndex;
                if (this.shuffleMode) {
                    do {
                        newIndex = Math.floor(Math.random() * this.songs.length);
                    } while (newIndex === this.currentSongIndex && this.songs.length > 1);
                } else {
                    newIndex = this.currentSongIndex + 1;
                    if (newIndex >= this.songs.length) newIndex = 0;
                }
                
                this.playSong(newIndex);
            }

            handleSongEnd() {
                if (this.repeatMode === 'one') {
                    this.audio.currentTime = 0;
                    this.audio.play();
                } else if (this.repeatMode === 'all' || this.currentSongIndex < this.songs.length - 1) {
                    this.playNext();
                }
            }

            toggleShuffle() {
                this.shuffleMode = !this.shuffleMode;
                this.updateShuffleButton();
                localStorage.setItem('shuffleMode', this.shuffleMode);
                this.showNotification(this.shuffleMode ? 'حالت تصادفی فعال شد' : 'حالت تصادفی غیرفعال شد');
            }

            toggleRepeat() {
                const modes = ['none', 'one', 'all'];
                const currentIndex = modes.indexOf(this.repeatMode);
                this.repeatMode = modes[(currentIndex + 1) % modes.length];
                this.updateRepeatButton();
                localStorage.setItem('repeatMode', this.repeatMode);
                
                const messages = {
                    'none': 'حالت تکرار غیرفعال',
                    'one': 'تکرار یک آهنگ فعال شد',
                    'all': 'تکرار همه آهنگ‌ها فعال شد'
                };
                this.showNotification(messages[this.repeatMode]);
            }

            updateShuffleButton() {
                const btn = document.getElementById('shuffleBtn');
                if (this.shuffleMode) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            }

            updateRepeatButton() {
                const btn = document.getElementById('repeatBtn');
                btn.classList.remove('active');
                
                if (this.repeatMode === 'one') {
                    btn.textContent = '🔂';
                    btn.classList.add('active');
                } else if (this.repeatMode === 'all') {
                    btn.textContent = '🔁';
                    btn.classList.add('active');
                } else {
                    btn.textContent = '🔁';
                }
            }

            updateProgress() {
                if (this.audio.duration) {
                    const percent = (this.audio.currentTime / this.audio.duration) * 100;
                    this.progressBar.style.width = percent + '%';
                    this.currentTime.textContent = this.formatTime(this.audio.currentTime);
                }
            }

            updateDuration() {
                this.duration.textContent = this.formatTime(this.audio.duration);
            }

            updatePlayButton() {
                this.playPauseBtn.textContent = this.audio.paused ? '▶' : '⏸';
            }

            updateSongCount() {
                this.songCount.textContent = `${this.songs.length} آهنگ`;
            }

            // Playlist functions
            savePlaylist() {
                if (this.songs.length === 0) {
                    this.showNotification('لیست پخش خالی است', 'error');
                    return;
                }

                const playlist = {
                    name: 'پلی‌لیست ' + new Date().toLocaleDateString('fa-IR'),
                    songs: this.songs.map(s => ({
                        name: s.name,
                        size: s.size,
                        title: s.title,
                        artist: s.artist
                    })),
                    date: new Date().toISOString()
                };

                const playlists = JSON.parse(localStorage.getItem('savedPlaylists') || '[]');
                playlists.push(playlist);
                localStorage.setItem('savedPlaylists', JSON.stringify(playlists));

                this.showNotification('پلی‌لیست ذخیره شد', 'success');
            }

            loadPlaylist() {
                const playlists = JSON.parse(localStorage.getItem('savedPlaylists') || '[]');
                
                if (playlists.length === 0) {
                    this.showNotification('پلی‌لیستی ذخیره نشده', 'error');
                    return;
                }

                // Create simple selection UI
                let message = 'پلی‌لیست‌های ذخیره شده:\n';
                playlists.forEach((p, i) => {
                    message += `${i + 1}. ${p.name} (${p.songs.length} آهنگ)\n`;
                });

                const index = prompt(message, '1');
                if (!index) return;

                const playlistIndex = parseInt(index) - 1;
                if (playlistIndex >= 0 && playlistIndex < playlists.length) {
                    this.showNotification('برای بارگذاری پلی‌لیست باید فایل‌ها دوباره آپلود شوند', 'error');
                }
            }

            saveSongsToStorage() {
                // Save song metadata (not the actual files)
                const songsMeta = this.songs.map(s => ({
                    name: s.name,
                    size: s.size,
                    title: s.title,
                    artist: s.artist,
                    id: s.id
                }));
                localStorage.setItem('currentSongs', JSON.stringify(songsMeta));
            }

            loadFromStorage() {
                // Load settings
                this.shuffleMode = localStorage.getItem('shuffleMode') === 'true';
                this.repeatMode = localStorage.getItem('repeatMode') || 'none';
                
                this.updateShuffleButton();
                this.updateRepeatButton();

                // Check for last played
                const lastPlayed = localStorage.getItem('lastPlayed');
                if (lastPlayed) {
                    // Just for display, actual file needs to be re-uploaded
                }
            }

            clearAllFiles() {
                // Revoke all object URLs
                this.songs.forEach(song => {
                    if (song.url) {
                        URL.revokeObjectURL(song.url);
                    }
                });

                this.songs = [];
                this.currentSongIndex = -1;
                this.audio.pause();
                this.audio.src = '';
                
                this.renderFileList();
                this.updateSongCount();
                this.playerSection.style.display = 'none';
                
                localStorage.removeItem('currentSongs');
                this.showNotification('لیست پخش پاک شد', 'success');
            }

            formatTime(seconds) {
                if (isNaN(seconds)) return '00:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            formatSize(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
            }

            showNotification(message, type = 'info') {
                const notification = document.getElementById('notification');
                notification.textContent = message;
                notification.className = `notification show ${type}`;
                
                setTimeout(() => {
                    notification.classList.remove('show');
                }, 3000);
            }
        }

        // Initialize player
        const player = new UniversalMusicPlayer();
    </script>
</body>
</html>
